<div class="row">
    <div class="col-lg-12">
        <h2>Product Management</h2>
        <hr>
        <button class="btn btn-success" ng-click="openModal('add')">
            + Create Product
        </button>
    </div>
</div>

<!-- ================= SEARCH + FILTER ================= -->
<div class="row" style="margin-top:15px; margin-bottom:15px;">
    
    <!-- Search by name -->
    <div class="col-md-4">
        <input type="text"
               class="form-control"
               ng-model="search.name"
               placeholder="🔍 Search by product name">
    </div>

    <!-- Category dropdown filter -->
    <div class="col-md-4">
        <select class="form-control"
                ng-model="search.category_id"
                ng-options="c.id as c.name for c in categories">
            <option value="">-- Filter by Category --</option>
        </select>
    </div>

</div>

<!-- ================= TABLE ================= -->
<div class="row">
    <div class="col-md-12">
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th width="60">ID</th>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th width="200">Action</th>
                </tr>
            </thead>
            <tbody>

                <tr ng-repeat="p in getPaginatedData()">
                    <td>{{ p.id }}</td>
                    <td>{{ p.name }}</td>
                    <td>{{ p.category.name }}</td>
                    <td>
                        {{ p.price }}

                        <span class="label label-danger" ng-if="p.price > 1000">
                            Expensive
                        </span>

                        <span class="label label-success" ng-if="p.price <= 1000">
                            Affordable
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-warning btn-sm" ng-click="openModal('edit', p)">Edit</button>
                        <button class="btn btn-danger btn-sm" ng-click="remove(p.id, $index)">Delete</button>
                    </td>
                </tr>

                <tr ng-if="getPaginatedData().length == 0">
                    <td colspan="5" class="text-center">No Products Found</td>
                </tr>

            </tbody>
        </table>
    </div>
</div>

<!-- ================= PAGINATION ================= -->
<div class="text-center" style="margin-top:20px;">

    <button class="btn btn-default"
            ng-click="prevPage()"
            ng-disabled="currentPage == 1">
        Prev
    </button>

    <button class="btn btn-primary"
            ng-repeat="n in [].constructor(totalPages()) track by $index"
            ng-click="setPage($index + 1)"
            ng-class="{'btn-success': currentPage == ($index + 1)}">
        {{$index + 1}}
    </button>

    <button class="btn btn-default"
            ng-click="nextPage()"
            ng-disabled="currentPage == totalPages()">
        Next
    </button>

</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h4>{{ form.id ? 'Edit Product' : 'Add Product' }}</h4>
            </div>
            <div class="modal-body">
                <form ng-submit="form.id ? update() : save()">

                    <div class="form-group">
                        <label>Category</label>
                        <select class="form-control"
                                ng-model="form.category_id"
                                ng-options="c.id as c.name for c in categories"
                                required>
                            <option value="">-- Select Category --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text"
                               class="form-control"
                               ng-model="form.name"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Price</label>
                        <input type="number"
                               class="form-control"
                               ng-model="form.price"
                               required>
                    </div>

                    <button class="btn btn-primary">
                        {{ form.id ? 'Update' : 'Save' }}
                    </button>

                    <button type="button"
                            class="btn btn-default"
                            data-dismiss="modal">
                        Cancel
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>
