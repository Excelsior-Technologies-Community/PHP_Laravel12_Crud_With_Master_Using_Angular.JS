<div class="row">
    <div class="col-lg-12">
        <h2>Product Management</h2>
        <hr>
        <button class="btn btn-success" ng-click="openModal('add')">+ Create Product</button>
    </div>
</div>

<div class="row" style="margin-top:15px; margin-bottom:15px;">
    <div class="col-md-4">
        <input type="text" class="form-control" ng-model="search.name" placeholder="Search by product name">
    </div>
    <div class="col-md-4">
        <select class="form-control" ng-model="search.category_id" ng-options="c.id as c.name for c in categories">
            <option value="">-- Filter by Category --</option>
        </select>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th width="60">ID</th>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Sizes</th>
                    <th width="160">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="p in getPaginatedData()">
                    <td>{{ p.id }}</td>
                    <td>{{ p.name }}</td>
                    <td>
                        <span class="badge" style="background:#337ab7;">{{ p.category.name }}</span>
                    </td>
                    <td>
                        ₹{{ p.price }}
                        <span class="label label-danger"  ng-if="p.price > 1000">Expensive</span>
                        <span class="label label-success" ng-if="p.price <= 1000">Affordable</span>
                    </td>
                    <td>
                        <span ng-if="!p.sizes || p.sizes.length == 0" class="text-muted">-</span>
                        <span ng-repeat="s in p.sizes" class="badge" style="background:#5cb85c; margin-right:3px;">
                            {{ s.code }}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-warning btn-sm" ng-click="openModal('edit', p)">Edit</button>
                        <button class="btn btn-danger btn-sm"  ng-click="remove(p.id, $index)">Delete</button>
                    </td>
                </tr>
                <tr ng-if="getPaginatedData().length == 0">
                    <td colspan="6" class="text-center">No Products Found</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="text-center" style="margin-top:20px;">
    <button class="btn btn-default" ng-click="prevPage()" ng-disabled="currentPage == 1">Prev</button>
    <button class="btn btn-default"
            ng-repeat="n in [].constructor(totalPages()) track by $index"
            ng-click="setPage($index + 1)"
            ng-class="{'btn-primary': currentPage == ($index + 1)}">
        {{ $index + 1 }}
    </button>
    <button class="btn btn-default" ng-click="nextPage()" ng-disabled="currentPage == totalPages()">Next</button>
</div>

<div class="modal fade" id="productModal" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header" style="background:#337ab7; color:#fff;">
                <button type="button" class="close" data-dismiss="modal" style="color:#fff;">&times;</button>
                <h4 class="modal-title">{{ form.id ? 'Edit Product' : 'Add Product' }}</h4>
            </div>

            <div class="modal-body">
                <form ng-submit="form.id ? update() : save()">

                    <div class="form-group">
                        <label>Category</label>
                        <select class="form-control"
                                ng-model="form.category_id"
                                ng-options="c.id as c.name for c in categories"
                                required>
                            <option value="">-- Select Category --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" class="form-control" ng-model="form.name" required>
                    </div>

                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" class="form-control" ng-model="form.price" min="0" required>
                    </div>

                    <div class="form-group">
                        <label>Size</label>
                        <select class="form-control"
                                ng-model="form.size_id"
                                ng-options="s.id as s.name for s in sizes"
                                required>
                            <option value="">-- Select Size --</option>
                        </select>
                    </div>

                    <hr>
                    <button type="submit" class="btn btn-primary">{{ form.id ? 'Update' : 'Save' }}</button>
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>

                </form>
            </div>

        </div>
    </div>
</div>
