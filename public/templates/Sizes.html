<div class="row">
    <div class="col-lg-12">
        <h2>Size Management</h2>
        <hr>
        <button class="btn btn-success" ng-click="openModal('add')">+ Create Size</button>
    </div>
</div>

<div class="row" style="margin-top:20px;">
    <div class="col-md-8">
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th width="80">ID</th>
                    <th>Name</th>
                    <th>Code</th>
                    <th width="200">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="s in sizes">
                    <td>{{ s.id }}</td>
                    <td>{{ s.name }}</td>
                    <td><strong>{{ s.code }}</strong></td>
                    <td>
                        <button class="btn btn-warning btn-sm" ng-click="openModal('edit', s)">Edit</button>
                        <button class="btn btn-danger btn-sm" ng-click="remove(s.id, $index)">Delete</button>
                    </td>
                </tr>
                <tr ng-if="sizes.length == 0"><td colspan="4" class="text-center">No Sizes Found</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="sizeModal" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background:#337ab7; color:#fff;">
                <button type="button" class="close" data-dismiss="modal" style="color:#fff;">&times;</button>
                <h4 class="modal-title">{{ form.id ? 'Edit Size' : 'Add Size' }}</h4>
            </div>
            <div class="modal-body">
                <form ng-submit="form.id ? update() : save()">
                    <div class="form-group">
                        <label>Size Name (e.g. Small, Medium)</label>
                        <input type="text" class="form-control" ng-model="form.name" required>
                    </div>
                    <div class="form-group">
                        <label>Code (e.g. S, M, XL)</label>
                        <input type="text" class="form-control" ng-model="form.code" required>
                    </div>
                    <button type="submit" class="btn btn-primary">{{ form.id ? 'Update' : 'Save' }}</button>
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                </form>
            </div>
        </div>
    </div>
</div>
